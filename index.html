<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Graphing Calculator</title>
  <link rel="stylesheet" href="src/tokens.css" />
  <link rel="stylesheet" href="src/base.css" />
  <link rel="stylesheet" href="src/layout.css" />
  <link rel="stylesheet" href="src/components.css" />
</head>
<body>

<div id="loading">
  <div class="loading-inner">
    <div class="spinner"></div>
    <div class="loading-text">Initialising 3D engine...</div>
  </div>
</div>

<button id="mobile-toggle" aria-label="Open sidebar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="logo-wrap">
        <svg class="logo-mark" viewBox="0 0 28 28" fill="none" aria-label="3DGraph">
          <rect width="28" height="28" rx="6" fill="var(--color-primary)" opacity="0.12"/>
          <polyline points="6,20 6,9 17,9" stroke="var(--color-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="6,9 12,5 23,5 23,16 17,20 6,20" stroke="var(--color-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="17" y1="9" x2="23" y2="5" stroke="var(--color-primary)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="17" y1="9" x2="17" y2="20" stroke="var(--color-primary)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M8 18 Q12 12 18 10" stroke="var(--color-gold)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.9"/>
        </svg>
        <div class="logo-name">3D<span>Graph</span></div>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme" data-theme-toggle>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <div id="sidebar-scroll">

      <!-- Functions -->
      <div class="sidebar-section">
        <div class="section-label">Functions f(x, y)</div>
        <div id="graphs-list"></div>
        <button class="btn-add-graph" id="btn-add">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add function
        </button>
      </div>

      <div class="divider"></div>

      <!-- View Range -->
      <div class="sidebar-section">
        <div class="section-label">View Range</div>
        <div class="control-group">
          <div class="control-row">
            <span class="control-label">X range</span>
            <div class="range-wrap">
              <input type="range" id="xRange" min="2" max="20" value="8" step="0.5"/>
              <span class="range-value" id="xRangeVal">±8</span>
            </div>
          </div>
          <div class="control-row">
            <span class="control-label">Y range</span>
            <div class="range-wrap">
              <input type="range" id="yRange" min="2" max="20" value="8" step="0.5"/>
              <span class="range-value" id="yRangeVal">±8</span>
            </div>
          </div>
          <div class="control-row">
            <span class="control-label">Resolution</span>
            <div class="range-wrap">
              <input type="range" id="resolution" min="20" max="120" value="60" step="5"/>
              <span class="range-value" id="resolutionVal">60</span>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Display -->
      <div class="sidebar-section">
        <div class="section-label">Display</div>
        <div class="control-group">
          <div class="toggle-row">
            <span class="toggle-label">Wireframe</span>
            <label class="toggle"><input type="checkbox" id="wireframe"/><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Show axes</span>
            <label class="toggle"><input type="checkbox" id="showAxes" checked/><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Show grid</span>
            <label class="toggle"><input type="checkbox" id="showGrid" checked/><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Auto-rotate</span>
            <label class="toggle"><input type="checkbox" id="autoRotate"/><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="control-row">
            <span class="control-label">Opacity</span>
            <div class="range-wrap">
              <input type="range" id="opacity" min="0.1" max="1" value="0.9" step="0.05"/>
              <span class="range-value" id="opacityVal">90%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Analysis -->
      <div class="sidebar-section">
        <div class="section-label">Analysis</div>
        <div class="control-group">
          <button class="btn-primary" id="btn-analyze">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Run Analysis
          </button>
          <button class="btn-secondary" id="btn-clear-analysis">Clear results</button>
        </div>
        <div id="intersection-list"></div>
      </div>

      <div class="divider"></div>

      <!-- Presets -->
      <div class="sidebar-section">
        <div class="section-label">Presets</div>
        <div class="presets-grid" id="presets-grid"></div>
      </div>

      <div style="height:1rem"></div>
    </div>
  </aside>

  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>

    <div id="canvas-controls">
      <button class="canvas-btn" id="btn-reset" title="Reset camera">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <button class="canvas-btn" id="btn-topview" title="Top view">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>
        </svg>
      </button>
      <button class="canvas-btn" id="btn-screenshot" title="Screenshot">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div id="axes-labels">
      <div class="axis-badge x">X</div>
      <div class="axis-badge y">Z</div>
      <div class="axis-badge z">Y</div>
    </div>

    <!-- Analysis results printed near graph -->
    <div id="analysis-panel">
      <div class="analysis-title" id="analysis-title">Analysis Results</div>
      <div id="analysis-content"></div>
    </div>

    <div id="info-panel">
      <strong>Controls</strong>
      Drag — rotate<br/>
      Scroll — zoom<br/>
      Right-drag — pan
    </div>
  </div>
</div>

<div id="color-picker-popup"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="src/constants.js"></script>
<script src="src/state.js"></script>
<script src="src/renderer.js"></script>
<script src="src/mesh.js"></script>
<script src="src/controls.js"></script>
<script src="src/analysis.js"></script>
<script src="src/ui.js"></script>
<script src="src/theme.js"></script>
<script src="src/main.js"></script>
</body>
</html>
